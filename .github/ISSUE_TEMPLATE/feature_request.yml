name: Feature request
description: Propose a new transport, capability, or surface
labels: ["enhancement"]
body:
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - SSE + REST transport
        - WebSocket transport
        - Webhook transport
        - bridge
        - SDK
        - CLI
        - new transport / surface
        - other / unsure
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
